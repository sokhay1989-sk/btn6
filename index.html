<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Button</title>
</head>
<style>
    .container {
        margin-top: 50px;
        margin-left: 20px;

    }

    h3 {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 32px;

    }

    button {
        padding: 12px 30px;
        border: none;
        color: white;
        border-radius: 6px;
        margin-right: 10px;
        margin-left: 20px;

    }

    .btn1 {
        background-color: blue;

    }

    .btn2 {
        background-color: black;
    }

    .btn3 {
        background-color: transparent;
        color: black;
        border: 1px solid black;
        border-radius: 50px;

    }
    .btn4{
        background-color: rgb(167, 12, 115);
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn4:hover{
        background-color: rgb(249, 54, 87);
    }
    .btn5{
        background-color: rgb(228, 15, 15);
        cursor: pointer;
        transition: all 0.3s;
        outline: 1px solid blue;
    }
    .btn5:hover{
        background-color: transparent;
        color: blue;
    }
    .btn6{
        background-color: transparent;
        color: blue;
        outline: 1px solid blue;
        border-radius: 50px;
        transition: all 0.3s;
    }
    .btn6:hover{
        background-color: black;
        outline: none;
        color: white;
    }
    .btn7{
        background-color: black;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn7:hover{
        transform: scale(1.1);
        background-color: blue;
    }
    .btn8{
        background-color: blue;
        cursor:pointer;
        transition: all 0.3s;
    }
    .btn8:hover{
        background-color: red;
        transform: rotate(90deg);
        color: blue;
    }
    .btn9{
        background-color: rgb(150, 6, 30);
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn9:hover{
        background-color: blue;
        transform: scale(0.9);
    }

</style>

<body>
    <div class="container">
        <h3>Primary</h3>

        <button class="btn1">Primary-btn</button>
        <button class="btn2">Primary-btn</button>
        <button class="btn3">Primary-btn</button>

    </div>

    <div class="container">
        <h3>Primary</h3>

        <button class="btn4">Primary-btn</button>
        <button class="btn5">Primary-btn</button>
        <button class="btn6">Primary-btn</button>

    </div>

    <div class="container">
        <h3>Primary</h3>

        <button class="btn7">Primary-btn</button>
        <button class="btn8">Primary-btn</button>
        <button class="btn9">Primary-btn</button>

    </div>
</body>

</html>
